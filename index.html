                    <h1 class="text-2xl sm:text-3xl font-extrabold mb-4 tracking-tight font-poppins px-2 leading-tight">AI Maturity Index 360°</h1>
                    <p class="text-slate-500 mb-10 text-sm px-6 leading-relaxed">Získejte hloubkovou analýzu své fáze adopce AI a rozvojový plán pro příští kvartál. Váš postup se automaticky ukládá.</p>
                    <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition-all shadow-lg flex items-center justify-center gap-2 font-poppins tracking-wide">Zahájit analýzu <i data-lucide="arrow-right"></i></button>
                </div>`;
            lucide.createIcons();
            document.getElementById('start-btn').onclick = showCategoryIntro;
        }

        function showCategoryIntro() {
            const cat = questions[currentIdx].cat;
            const config = categoryConfig[cat];
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="text-center animate-fade-in py-8">
                    <div class="w-16 h-16 sm:w-20 sm:h-20 bg-${config.color}-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl"><i data-lucide="${config.icon}" size="36"></i></div>
                    <h3 class="text-${config.color}-600 font-black uppercase text-[10px] tracking-[0.3em] mb-4">Oblast ${Object.keys(categoryConfig).indexOf(cat) + 1} ze 4</h3>
                    <h2 class="text-xl sm:text-2xl font-black mb-4 font-poppins leading-snug text-slate-900">${cat}</h2>
                    <p class="text-slate-500 mb-10 text-sm leading-relaxed px-8">${config.desc}</p>
                    <button id="cont-btn" class="w-full bg-${config.color}-600 hover:bg-${config.color}-700 text-white py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg font-poppins">Vstoupit do sekce <i data-lucide="arrow-right"></i></button>
                </div>`;
            lucide.createIcons();
            document.getElementById('cont-btn').onclick = showQuiz;
        }

        function showQuiz() {
            const q = questions[currentIdx];
            const config = categoryConfig[q.cat];
            document.getElementById('progress-bar').className = `h-full bg-${config.color}-600 transition-all duration-500`;
            document.getElementById('progress-bar').style.width = `${(currentIdx / questions.length) * 100}%`;

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="animate-fade-in flex flex-col h-full text-slate-800">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[9px] font-black uppercase tracking-widest text-${config.color}-600 bg-${config.color}-50 px-3 py-1 rounded-full">${q.cat}</span>
                        <div class="flex items-center gap-3 text-slate-400">
                            ${(currentIdx > 0 && history.length > 0) ? `<button id="back-btn" class="hover:text-slate-600 flex items-center gap-1 text-[9px] font-bold uppercase"><i data-lucide="arrow-left" size="12"></i> Zpět</button>` : ''}
                            <span class="text-[9px] font-bold text-slate-300 uppercase font-mono">${currentIdx + 1} / ${questions.length}</span>
                        </div>
                    </div>
                    <h2 class="text-lg sm:text-xl font-bold mb-6 text-slate-800 leading-tight font-poppins min-h-[4rem]">${q.text}</h2>
                    <div class="space-y-2.5" id="options"></div>
                </div>`;
            
            const container = document.getElementById('options');
            q.options.forEach(opt => {
                const b = document.createElement('div');
                b.className = `option-card p-4 border-2 border-slate-100 rounded-xl cursor-pointer hover:border-${config.color}-500 hover:bg-${config.color}-50 transition-all text-slate-600 font-medium text-sm flex items-center gap-3 shadow-sm`;
                b.innerHTML = `<div class="w-4 h-4 rounded-full border-2 border-slate-200 flex-shrink-0"></div> <span class="leading-tight text-slate-700 font-medium">${opt.text}</span>`;
                b.onclick = () => handleAnswer(opt.p);
                container.appendChild(b);
            });
            lucide.createIcons();
            if (document.getElementById('back-btn')) document.getElementById('back-btn').onclick = handleBack;
        }

        function handleAnswer(p) {
            history = [{ currentIdx, totalPoints, categoryScores: JSON.parse(JSON.stringify(categoryScores)) }];
            totalPoints += p;
            categoryScores[questions[currentIdx].cat] += p;
            if (currentIdx < questions.length - 1) {
                const oldCat = questions[currentIdx].cat;
                currentIdx++;
                saveDraft();
                if (questions[currentIdx].cat !== oldCat) showCategoryIntro(); else showQuiz();
            } else { finishQuiz(); }
        }

        function handleBack() {
            if (history.length === 0) return;
            const prevState = history.pop();
            currentIdx = prevState.currentIdx;
            totalPoints = prevState.totalPoints;
            categoryScores = prevState.categoryScores;
            saveDraft();
            showQuiz();
        }

        async function finishQuiz() {
            const result = levels.find(l => totalPoints >= l.min && totalPoints <= l.max) || levels[0];
            const weakestCat = Object.keys(categoryScores).reduce((a, b) => categoryScores[a] < categoryScores[b] ? a : b);
            const gapTip = categoryGapTips[weakestCat];
            const alias = `${adjectives[Math.floor(Math.random() * adjectives.length)]} ${nouns[Math.floor(Math.random() * nouns.length)]}`;
            
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('content').innerHTML = `
                <div id="report-to-pdf" class="animate-fade-in bg-white p-2">
                    <!-- Header -->
                    <div class="text-center mb-8 border-b pb-8 border-slate-100 pdf-header text-slate-900">
                        <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-50 text-blue-600 rounded-full mb-4 no-print header-icon"><i data-lucide="award" size="28"></i></div>
                        <h2 class="text-slate-400 font-bold uppercase text-[9px] tracking-[0.3em] mb-1">Diagnostický Portrét</h2>
                        <h1 class="text-2xl font-black text-slate-900 font-poppins leading-tight mb-2 report-title">${result.name}</h1>
                        <p class="text-blue-600 font-bold text-xs uppercase tracking-widest score-text">Index Adopce: ${totalPoints} / 48 bodů</p>
                    </div>

                    <div class="space-y-10 pdf-space text-slate-800">
                        <!-- Reality Check -->
                        <section class="section-Reality">
                            <h3 class="flex items-center gap-2 text-slate-900 font-bold text-xs uppercase tracking-wider mb-3 font-poppins section-title">
                                <i data-lucide="search" size="14" class="text-blue-500 no-print"></i> Pohled pod kapotu (Vaše realita)
                            </h3>
                            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 text-slate-700 text-sm leading-relaxed section-content">${result.desc}</div>
                        </section>
                        
                        <!-- Future Vision -->
                        <section class="grid grid-cols-1 md:grid-cols-2 gap-4 vision-grid">
                            <div class="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100/50 vision-box">
                                <h4 class="text-indigo-600 font-black uppercase text-[9px] mb-2 tracking-widest font-poppins text-center">Přínos posunu</h4>
                                <p class="text-[11px] text-indigo-900 leading-relaxed">${result.whyMove}</p>
                            </div>
                            <div class="bg-blue-50/50 p-5 rounded-2xl border border-blue-100/50 vision-box">
                                <h4 class="text-blue-600 font-black uppercase text-[9px] mb-2 tracking-widest font-poppins text-center">Vize Vašeho L+1</h4>
                                <p class="text-[11px] text-blue-900 leading-relaxed">${result.nextDesc}</p>
                            </div>
                        </section>

                        <!-- Gap Analysis -->
                        <section>
                            <h3 class="flex items-center gap-2 text-red-600 font-bold text-xs uppercase tracking-wider mb-3 font-poppins section-title">
                                <i data-lucide="target" size="14" class="no-print"></i> Priorita rozvoje: ${gapTip.name}
                            </h3>
                            <div class="bg-red-50/50 p-5 rounded-2xl border border-red-100/50 section-content">
                                <p class="text-[11px] text-red-900 font-bold mb-2">${gapTip.desc}</p>
                                <p class="text-[11px] text-red-800 leading-relaxed font-medium"><strong>Akce:</strong> ${gapTip.action}</p>
                            </div>
                        </section>

                        <!-- Detailed Action Plan -->
                        <section>
                            <h3 class="flex items-center gap-2 text-emerald-600 font-bold text-xs uppercase tracking-wider mb-4 font-poppins section-title">
                                <i data-lucide="navigation-2" size="14" class="no-print"></i> Rozvojový plán pro příštích 30 dní
                            </h3>
                            <div class="space-y-3 plan-container text-slate-800" id="dev-plan-container"></div>
                        </section>

                        <!-- Pro Tip Box -->
                        <section id="ai-tip-section" class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl border border-slate-700 tip-section">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-blue-400 font-bold text-[10px] uppercase flex items-center gap-2 font-poppins">
                                    <i data-lucide="rocket" size="14" class="no-print"></i> AI Pro-Tip: Váš akcelerátor
                                </h3>
                                <span class="text-[8px] bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded-full uppercase font-bold no-print">Kopie promptu</span>
                            </div>
                            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 font-mono text-[10px] text-blue-100 leading-relaxed select-all mb-4 prompt-box">
                                ${result.aiProTip}
                            </div>
                            <div class="border-t border-slate-700/50 pt-4 methodology-box">
                                <h4 class="text-[9px] font-bold text-slate-400 uppercase mb-2">Metodika práce:</h4>
                                <p class="text-[10px] text-slate-300 leading-relaxed">${result.methodology}</p>
                            </div>
                        </section>

                        <!-- Reveal Alias (Úplný konec) -->
                        <section id="alias-box" class="p-8 border-2 border-dashed border-slate-200 rounded-[2.5rem] bg-slate-50/50 text-center transition-all mt-12 no-print">
                             <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-4 italic">Tento box nechte zavřený do pokynu lektora</p>
                             <div id="alias-locked" class="py-4">
                                <p class="text-xs font-bold text-slate-500 flex items-center justify-center gap-2"><i data-lucide="lock" size="12"></i> Identita uzamčena...</p>
                             </div>
                             <div id="alias-unlocked" class="hidden">
                                <div id="alias-reveal-btn-container">
                                    <button id="do-reveal-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3.5 rounded-2xl font-bold text-[10px] uppercase shadow-lg shadow-blue-200 transition-all active:scale-95">Odhalit můj tajný alias</button>
                                </div>
                                <div id="alias-name" class="hidden animate-fade-in">
                                    <p class="text-[10px] text-blue-500 font-bold uppercase mb-1">Vaše identita je:</p>
                                    <span class="text-3xl font-black text-blue-600 uppercase tracking-tighter font-poppins">${alias}</span>
                                </div>
                             </div>
                        </section>
                    </div>
                </div>
                
                <div class="mt-8 pt-8 border-t border-slate-100 text-center no-print">
                    <button id="download-pdf-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 mb-4 hover:bg-black transition-all shadow-xl font-poppins tracking-wide"><i data-lucide="download"></i> Stáhnout PDF Report</button>
                    <button onclick="window.location.reload()" class="text-slate-400 font-bold text-[10px] uppercase hover:underline font-poppins tracking-wider">Zkusit znovu</button>
                </div>`;

            const planContainer = document.getElementById('dev-plan-container');
            result.plan.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex gap-4 items-start p-4 bg-white rounded-2xl border border-slate-100 shadow-sm plan-item";
                div.innerHTML = `<div class="mt-1 text-emerald-500 bg-emerald-50 p-1.5 rounded-lg flex-shrink-0 plan-icon"><i data-lucide="check-circle-2" size="16"></i></div><div><h4 class="text-slate-900 font-bold text-xs mb-1 font-poppins plan-title">${item.title}</h4><p class="text-[11px] text-slate-500 leading-relaxed font-medium plan-text">${item.text}</p></div>`;
                planContainer.appendChild(div);
            });

            lucide.createIcons();

            onSnapshot(doc(db, 'artifacts', internalAppId, 'public', 'data', 'settings', 'global'), (snap) => {
                if (snap.exists() && snap.data().allowAliasReveal) {
                    document.getElementById('alias-locked')?.classList.add('hidden');
                    document.getElementById('alias-unlocked')?.classList.remove('hidden');
                }
            });

            document.getElementById('do-reveal-btn').onclick = () => {
                document.getElementById('alias-reveal-btn-container').classList.add('hidden');
                document.getElementById('alias-name').classList.remove('hidden');
                document.getElementById('alias-box').classList.add('border-blue-200', 'bg-blue-50/30', 'border-solid');
            };

            document.getElementById('download-pdf-btn').onclick = function() {
                const element = document.getElementById('report-to-pdf');
                html2pdf().set({ 
                    margin: [5, 10, 5, 10], 
                    filename: 'AI_Maturity_Report.pdf', 
                    image: { type: 'jpeg', quality: 1.0 }, 
                    pagebreak: { mode: 'avoid-all' }, 
                    html2canvas: { 
                        scale: 3, 
                        useCORS: true, 
                        backgroundColor: '#ffffff',
                        onclone: (clonedDoc) => {
                            const cloneBody = clonedDoc.body;
                            cloneBody.classList.add('pdf-mode');
                            const aliasBox = clonedDoc.getElementById('alias-box');
                            if (aliasBox) aliasBox.remove();
                            const report = clonedDoc.getElementById('report-to-pdf');
                            report.style.width = '100%';
                            report.style.maxWidth = '750px';
                            report.style.margin = '0 auto';
                            report.style.padding = '0 15px';
                            report.style.height = '275mm';
                            report.style.maxHeight = '275mm';
                            report.style.overflow = 'hidden';
                            const pdfSpace = clonedDoc.querySelector('.pdf-space');
                            if (pdfSpace) {
                                pdfSpace.classList.remove('space-y-10');
                                pdfSpace.style.gap = '3px';
                            }
                            const tipSection = clonedDoc.getElementById('ai-tip-section');
                            if (tipSection) {
                                tipSection.style.marginBottom = '0px';
                                tipSection.style.paddingBottom = '0px';
                            }
                            clonedDoc.querySelectorAll('*').forEach(el => {
                                el.style.boxShadow = 'none';
                                el.style.transition = 'none';
                                el.style.animation = 'none';
                            });
                        }
                    }, 
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                }).from(element).save();
            };

            if (user) {
                try {
                    const resRef = doc(db, 'artifacts', internalAppId, 'public', 'data', 'responses', user.uid);
                    await setDoc(resRef, { uid: user.uid, levelKey: result.key, levelName: result.name, points: totalPoints, categoryBreakdown: categoryScores, weakestArea: weakestCat, alias, ts: new Date().toISOString() });
                    await deleteDoc(doc(db, 'artifacts', internalAppId, 'users', user.uid, 'draft', 'progress'));
                } catch (e) { console.error(e); }
            }
        }

        const bootstrap = async () => {
            if (window.location.protocol === 'file:') {
                const content = document.getElementById('content');
                content.innerHTML = `<div class="text-center py-10 px-4 text-slate-800"><div class="w-16 h-16 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6"><i data-lucide="shield-alert" size="32"></i></div><h2 class="text-xl font-bold mb-2 font-poppins">Chyba protokolu</h2><p class="text-xs text-slate-500 mb-6 leading-relaxed">Diagnostika vyžaduje webový server (http/https).</p></div>`;
                lucide.createIcons();
                return;
            }
            const timeout = setTimeout(() => { if (!isUIReady) {
                 document.getElementById('content').innerHTML = `<div class="text-center p-8 text-slate-400 font-poppins">Spojení se servery Firebase vypršelo.</div>`;
            }}, 12000);

            onAuthStateChanged(auth, async (u) => {
                if (u) { clearTimeout(timeout); user = u; await loadDraft(); }
                else { try { const cred = await signInAnonymously(auth); user = cred.user; clearTimeout(timeout); await loadDraft(); } catch (err) { clearTimeout(timeout); } }
            });
        };
        window.onload = bootstrap;
    </script>
</body>
</html>
