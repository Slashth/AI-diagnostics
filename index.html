<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostika adopce AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURACE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBmy6Wg2hgML35nbBqavkDDDV1aIZTCqsU",
            authDomain: "ai-diagnostika.firebaseapp.com",
            projectId: "ai-diagnostika",
            storageBucket: "ai-diagnostika.firebasestorage.app",
            messagingSenderId: "965470292600",
            appId: "1:965470292600:web:28ba845829a3c849773b8d"
        };

        // --- IDENTITY NASTAVENÍ ---
        // Toto jméno složky musí přesně odpovídat jménu v Security Rules na Firebase
        const appId = 'ai-diagnostika-2024'; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;

        onAuthStateChanged(auth, (user) => { if (user) currentUser = user; });
        signInAnonymously(auth).catch(e => console.error("Auth error", e));

        window.saveResult = async (key, name) => {
            if (!currentUser) return;
            try {
                // RULE 1: Striktní cesta
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'responses', currentUser.uid);
                await setDoc(ref, { 
                    levelKey: key, 
                    levelName: name, 
                    ts: new Date().toISOString(),
                    uid: currentUser.uid 
                });
            } catch (e) { console.error("Save error", e); }
        };

        // Zbytek UI logiky zůstává stejný...
        window.startQuiz = () => {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        };

        const questions = [
            { text: "Jak hluboko je AI zapojena do vaší práce?", options: [
                { text: "L0: Vůbec.", score: 'A' }, { text: "L1: Pasivně.", score: 'B' }, { text: "L2: Experimentálně.", score: 'C' }, { text: "L3: Systematicky.", score: 'D' }
            ]}
        ];

        let currentIdx = 0;
        let answers = [];

        function renderQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-title').innerText = q.text;
            const container = document.getElementById('q-options');
            container.innerHTML = '';
            q.options.forEach(opt => {
                const b = document.createElement('div');
                b.className = "p-4 border-2 border-slate-100 rounded-xl cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all text-sm";
                b.innerText = opt.text;
                b.onclick = () => {
                    answers.push(opt.score);
                    if (currentIdx < questions.length - 1) {
                        currentIdx++; renderQuestion();
                    } else {
                        finish();
                    }
                };
                container.appendChild(b);
            });
        }

        async function finish() {
            const finalKey = answers[answers.length - 1];
            await window.saveResult(finalKey, "Úroveň " + finalKey);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('res-name').innerText = "Úroveň " + finalKey;
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
    <div class="max-w-md w-full bg-white shadow-2xl rounded-[2.5rem] p-8">
        <div id="intro-screen" class="text-center">
            <h1 class="text-2xl font-black mb-4">AI Diagnostika</h1>
            <button onclick="startQuiz()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Spustit</button>
        </div>
        <div id="quiz-screen" class="hidden">
            <h2 id="q-title" class="text-lg font-bold mb-6"></h2>
            <div id="q-options" class="space-y-3"></div>
        </div>
        <div id="result-screen" class="hidden text-center">
            <h2 id="res-name" class="text-3xl font-black text-blue-600 mb-2"></h2>
            <p class="text-slate-500 text-sm">Odesláno na dashboard.</p>
        </div>
    </div>
</body>
</html>
