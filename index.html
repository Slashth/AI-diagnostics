            { cat: "Nástroje a rutiny", text: "Kolik různých AI modelů/nástrojů aktivně ovládáte?", options: [{text:"Žádný",p:0},{text:"Používám jen bezplatné verze",p:1},{text:"Mám 1-2 profesionální nástroje",p:2},{text:"Využívám široké portfolio nástrojů",p:3}]},
            { cat: "Nástroje a rutiny", text: "Jak přemýšlíte o možnostech AI pro úkoly, které zatím děláte ručně?", options: [{text:"Nepřemýšlím o tom",p:0},{text:"Napadne mě to jen výjimečně",p:1},{text:"U každého nového úkolu zvažuji asistenci AI",p:2},{text:"Mám seznam procesů k automatizaci",p:3}]},

            { cat: "Prompt Engineering", text: "Jak pracujete s výstupem, který není ideální?", options: [{text:"Končím",p:0},{text:"Zkusím úplně jiný dotaz",p:1},{text:"Iteruji (ladím odpověď)",p:2},{text:"Vedeme hluboký dialog",p:3}]},
            { cat: "Prompt Engineering", text: "Využíváte techniku dávání příkladů (Few-shot)?", options: [{text:"Nevím, co to je",p:0},{text:"Slyšel/a jsem, nepoužívám",p:1},{text:"Občas u složitějších formátů",p:2},{text:"Pravidelně pro konzistenci",p:3}]},
            { cat: "Prompt Engineering", text: "Používáte Custom Instructions nebo vlastní agenty?", options: [{text:"Ne",p:0},{text:"Vím o tom, nemám nastaveno",p:1},{text:"Mám základní nastavení role",p:2},{text:"Mám knihovnu agentů",p:3}]},

            { cat: "Strategie a bezpečnost", text: "Dokážete identifikovat úkoly, kde AI nesmí být použita?", options: [{text:"Používám ji na všechno",p:0},{text:"Nějak intuitivně to cítím",p:1},{text:"Mám pro sebe jasné hranice",p:2},{text:"Mám definovaný etický rámec",p:3}]},
            { cat: "Strategie a bezpečnost", text: "Jak postupujete při ověřování faktických chyb?", options: [{text:"Věřím AI",p:0},{text:"Zkontroluji jen zásadní věci",p:1},{text:"Vše ověřuji externě",p:2},{text:"Validace je součástí workflow",p:3}]},
            { cat: "Strategie a bezpečnost", text: "Jak řešíte citlivá firemní data?", options: [{text:"Vkládám tam vše",p:0},{text:"Snažím se být opatrný/á",p:1},{text:"Důsledně anonymizuji",p:2},{text:"Využívám Enterprise prostředí",p:3}]},
            { cat: "Tým a budoucnost", text: "Sdílíte své postupy a prompty s kolegy?", options: [{text:"Ne",p:0},{text:"Občas někomu něco pošlu",p:1},{text:"Máme společný komunikační kanál",p:2},{text:"Máme firemní knihovnu",p:3}]},

            { min: 9, max: 18, key: 'B', name: "L1: Experimentátor (Ad-hoc)", desc: "Víte, že AI funguje, ale používáte ji nahodile jako vyhledávač. Chybí vám systém a důvěra.", whyMove: "Přestanete s AI 'bojovat' a začnete ji skutečně řídit.", nextDesc: "L2 má své vybrané oblasti, kde AI používá systematicky.", plan: [{ title: "Delegování", text: "Vyberte 1 rutinu a dělejte ji 14 dní s AI." }, { title: "Rámec zadání", text: "Dávejte AI kontext: Role - Kontext - Úkol - Formát." }], aiProTip: "Požádejte o koučink: 'Jsem L1 a používám tě náhodně. Kde mi dokážeš ušetřit 15 minut denně?'" },
            { min: 19, max: 29, key: 'C', name: "L2: Pokročilý uživatel (Utility)", desc: "AI používáte denně a šetříte čas. Stále však pracujete na úrovni zadání úkolů.", whyMove: "Stanete se architektem své práce. Přestanete jen dělat rychleji.", nextDesc: "L3 dříve než začne pracovat přemýšlí, co delegovat.", plan: [{ title: "Strategické dělení", text: "Ptejte se: Co musí udělat moje hlava a co vyřeší chatbot?" }, { title: "Custom Instructions", text: "Nastavte si v AI trvalé preference." }], aiProTip: "Výzva k posunu: 'Působím jako L2. Jak mám změnit své workflow, abych tě používal jako strategického partnera?'" },
            { min: 30, max: 40, key: 'D', name: "L3: Strategický lídr (Leverage)", desc: "Rozumíte pákám a multiplikujete svůj vliv. Jste vzorem pro okolí.", whyMove: "L4 je o naprosté svobodě a integraci nových standardů.", nextDesc: "L4 už nepoužívá AI jako nástroj bokem, ale jako tkáň procesů.", plan: [{ title: "Vlastní báze", text: "Vytvořte si agenty nebo knihovnu s vaším know-how." }, { title: "Mentoring", text: "Učte ostatní. Tím se sami nejrychleji posunete." }], aiProTip: "Zautomatizujte se: 'Dosáhl jsem L3. Jak s tvou pomocí navrhnout systém k odbavení reportingu bez mého zásahu?'" },
            { min: 41, max: 48, key: 'E', name: "L4: AI Integrátor & Maestro", desc: "AI je součástí vašeho myšlení. Transformujete celé systémy. Vaše hodnota je v kurátorství vizí.", whyMove: "Společenský dopad a inovace na samé hraně možného.", nextDesc: "Další úroveň je 'Systémová autonomie' – procesy běží zcela samy.", plan: [{ title: "Integrace", text: "Propojte chatbota s daty přes API nebo Make/Zapier." }, { title: "Human-Centric", text: "Uvolněný čas investujte do hloubkové empatie a vizí." }], aiProTip: "Strategie: 'Jsem L4. Pomoz mi navrhnout strategii, jak posunout 80 % týmu z L1 na L3.'" }
        ];

        const content = document.getElementById('content');
        const progressBar = document.getElementById('progress-bar');

        function showIntro() {
            content.innerHTML = `
                <div class="text-center animate-fade-in py-6">
                    <div class="w-16 h-16 sm:w-20 sm:h-20 bg-blue-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl">
                        <i data-lucide="zap" size="36"></i>
                    </div>

                    <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition-all shadow-lg flex items-center justify-center gap-2">
                        Zahájit analýzu <i data-lucide="arrow-right"></i>
                    </button>
                </div>
            `;
            lucide.createIcons();
            document.getElementById('start-btn').onclick = showCategoryIntro;
        }

        function showCategoryIntro() {
            const cat = questions[currentIdx].cat;
            const config = categoryConfig[cat];
            content.innerHTML = `
                <div class="text-center animate-fade-in py-8 sm:py-10">
                    <div class="w-16 h-16 sm:w-20 sm:h-20 bg-${config.color}-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl">
                        <i data-lucide="${config.icon}" size="36"></i>
                    </div>
                    <h3 class="text-${config.color}-600 font-black uppercase text-[10px] tracking-[0.3em] mb-4 text-slate-800">Oblast ${Object.keys(categoryConfig).indexOf(cat) + 1} ze 4</h3>
                    <h2 class="text-xl sm:text-2xl font-black mb-4 text-slate-900 font-poppins px-4 leading-snug">${cat}</h2>
                    <p class="text-slate-500 mb-10 text-sm leading-relaxed px-8 text-slate-600">${config.desc}</p>
                    <button id="cont-btn" class="w-full bg-${config.color}-600 hover:bg-${config.color}-700 text-white py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg">
                        Vstoupit do sekce <i data-lucide="arrow-right"></i>
                    </button>
                </div>
            `;
            lucide.createIcons();
            document.getElementById('cont-btn').onclick = showQuiz;
        }

        function showQuiz() {
            const q = questions[currentIdx];
            const config = categoryConfig[q.cat];
            progressBar.className = `h-full bg-${config.color}-600 transition-all duration-500`;
            progressBar.style.width = `${(currentIdx / questions.length) * 100}%`;

            content.innerHTML = `
                <div class="animate-fade-in flex flex-col h-full">
                    <div class="flex justify-between items-center mb-6 sm:mb-8">
                        <span class="text-[9px] font-black uppercase tracking-widest text-${config.color}-600 bg-${config.color}-50 px-3 py-1 rounded-full">${q.cat}</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${currentIdx + 1} / ${questions.length}</span>
                    </div>
                    <h2 class="text-lg sm:text-xl font-bold mb-6 sm:mb-8 text-slate-800 leading-tight min-h-[3.5rem] text-slate-800 font-poppins">${q.text}</h2>
                    <div class="space-y-2.5 sm:space-y-3" id="options"></div>
                </div>
            `;
            
            const optionsDiv = document.getElementById('options');
            q.options.forEach(opt => {
                const b = document.createElement('div');
                b.className = `option-card p-4 border-2 border-slate-100 rounded-xl sm:rounded-2xl cursor-pointer hover:border-${config.color}-500 hover:bg-${config.color}-50 transition-all text-slate-600 font-medium text-sm flex items-center gap-3 text-slate-700`;
                b.innerHTML = `<div class="w-4 h-4 rounded-full border-2 border-slate-200 flex-shrink-0"></div> <span class="leading-tight">${opt.text}</span>`;
                b.onclick = () => {
                    totalPoints += opt.p;
                    categoryScores[q.cat] += opt.p;
                    if (currentIdx < questions.length - 1) {
                        const oldCat = questions[currentIdx].cat;
                        currentIdx++;
                        if (questions[currentIdx].cat !== oldCat) showCategoryIntro();
                        else showQuiz();
                    } else {
                        finishQuiz();
                    }
                };
                optionsDiv.appendChild(b);
            });
            lucide.createIcons();
        }

        async function finishQuiz() {
            const result = levels.find(l => totalPoints >= l.min && totalPoints <= l.max) || levels[0];
            
            // Gap Analysis
            let weakestCat = "Nástroje a rutiny";
            let minScore = 999;
            for (const [cat, score] of Object.entries(categoryScores)) {
                if (score < minScore) { minScore = score; weakestCat = cat; }
            }
            const gapTip = categoryGapTips[weakestCat];

            // Generate Alias
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            const alias = `${adj} ${noun}`;

            progressBar.style.width = '100%';
            progressBar.className = 'h-full bg-blue-600 transition-all duration-500';

            content.innerHTML = `
                <div id="report-to-pdf" class="animate-fade-in bg-white" style="background-color: #ffffff !important;">

                        </div>
                    </div>

                        <h1 class="text-2xl sm:text-3xl font-black text-slate-900 leading-tight mb-1 report-title font-poppins">${result.name}</h1>
                        <p class="text-blue-600 font-bold text-xs uppercase tracking-widest score-text">Skóre: ${totalPoints} z 48 bodů</p>
                    </div>

                    <div class="space-y-6 content-body">
                        <div>
                            <h3 class="flex items-center gap-2 text-blue-600 font-bold text-xs uppercase tracking-wider mb-2 section-title font-poppins">
                                <i data-lucide="info" size="14"></i> Celkový stav a srovnání
                            </h3>
                            <div class="bg-slate-50 p-4 sm:p-5 rounded-2xl border border-slate-100 info-card">
                                <p class="text-sm text-slate-700 leading-relaxed main-desc">${result.desc}</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3 compare-grid">
                                <div class="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100/50 info-card">
                                    <h4 class="text-indigo-500 font-black uppercase text-[8px] mb-1 tracking-widest font-poppins">Přínos posunu</h4>
                                    <p class="text-[11px] text-indigo-900/80 leading-snug sub-text">${result.whyMove}</p>
                                </div>
                                <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100/50 info-card">
                                    <h4 class="text-blue-500 font-black uppercase text-[8px] mb-1 tracking-widest font-poppins">Co čekat dále</h4>
                                    <p class="text-[11px] text-blue-900/80 leading-snug sub-text">${result.nextDesc}</p>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h3 class="flex items-center gap-2 text-red-600 font-bold text-xs uppercase tracking-wider mb-2 section-title font-poppins">
                                <i data-lucide="target" size="14"></i> Priorita pro váš rozvoj: ${gapTip.name}
                            </h3>
                            <div class="bg-red-50/50 p-4 rounded-2xl border border-red-100/50 info-card">
                                <p class="text-[11px] text-red-900/90 font-semibold mb-1">${gapTip.desc}</p>
                                <p class="text-[11px] text-red-800/80 leading-snug">${gapTip.action}</p>
                            </div>
                        </div>

                        <div>
                            <h3 class="flex items-center gap-2 text-emerald-600 font-bold text-xs uppercase tracking-wider mb-2 section-title font-poppins">
                                <i data-lucide="map" size="14"></i> Akční plán rozvoje
                            </h3>
                            <div class="space-y-2" id="development-plan"></div>
                        </div>

                        <div id="ai-tip-box" class="bg-slate-900 text-white p-4 sm:p-5 rounded-2xl relative overflow-hidden tip-box-container">
                            <h3 class="flex items-center gap-2 text-blue-400 font-bold text-[10px] uppercase tracking-wider mb-2 section-title font-poppins">
                                <i data-lucide="rocket" size="16"></i> AI Pro-Tip: Využijte AI pro svůj růst
                            </h3>
                            <div class="bg-slate-800 p-3 rounded-lg border border-slate-700 font-mono text-[9px] leading-relaxed text-blue-100 select-all prompt-text">
                                ${result.aiProTip}
                            </div>
                        </div>
                    </div>
                </div>

                <div id="action-buttons" class="mt-8 pt-8 border-t border-slate-100 text-center no-print">
                    <div class="flex flex-col gap-3">
                        <button id="download-pdf-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold transition-all shadow-lg flex items-center justify-center gap-2 hover:bg-black touch-manipulation">
                            <i data-lucide="download"></i> Stáhnout PDF Report
                        </button>

                        <!-- Reveal Alias Section -->
                        <div id="alias-reveal-section" class="mt-6 p-6 border-2 border-dashed border-slate-200 rounded-3xl bg-slate-50/50 transition-all">
                             <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-3">Vaše identita pro aktivitu</p>
                             <div id="alias-display" class="hidden animate-fade-in mb-3">
                                 <span class="text-xl font-black text-blue-600 uppercase tracking-tight">${alias}</span>
                             </div>
                             <button id="reveal-btn" class="text-blue-600 font-bold text-[10px] uppercase tracking-widest hover:underline flex items-center justify-center gap-2 mx-auto">
                                <i data-lucide="eye" size="12"></i> Odhalit můj tajný alias
                             </button>
                        </div>

                        <button onclick="location.reload()" class="text-slate-400 font-bold text-[10px] uppercase hover:underline py-2">Zkusit znovu</button>
                    </div>
                </div>
            `;
            
            const planContainer = document.getElementById('development-plan');
            result.plan.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex gap-3 items-start p-3 bg-white rounded-xl border border-slate-100 shadow-sm plan-item";
                div.innerHTML = `
                    <div class="mt-0.5 text-emerald-500 bg-emerald-50 p-1 rounded-md flex-shrink-0">
                        <i data-lucide="check-circle-2" size="14"></i>
                    </div>
                    <div>
                        <h4 class="text-slate-800 font-bold text-[11px] mb-0.5 plan-title font-poppins">${item.title}</h4>
                        <p class="text-[10px] text-slate-500 leading-snug plan-desc">${item.text}</p>
                    </div>
                `;
                planContainer.appendChild(div);
            });
            lucide.createIcons();

            // Reveal logic
            document.getElementById('reveal-btn').onclick = function() {
                this.classList.add('hidden');
                document.getElementById('alias-display').classList.remove('hidden');
                document.getElementById('alias-reveal-section').classList.add('border-blue-200', 'bg-blue-50/30');
            };

            document.getElementById('download-pdf-btn').onclick = function() {
                const element = document.getElementById('report-to-pdf');
                html2pdf().set({
                    margin: [10, 15, 10, 15],
                    filename: 'AI_Maturity_Report.pdf',
                    image: { type: 'jpeg', quality: 1.0 },
                    html2canvas: { 
                        scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#ffffff', width: 800,
                        onclone: (clonedDoc) => {
                            const iconCircle = clonedDoc.querySelector('.icon-circle');
                            if (iconCircle) { iconCircle.style.backgroundColor = 'white'; iconCircle.style.border = 'none'; iconCircle.style.boxShadow = 'none'; }
                            const ribbonIcon = clonedDoc.querySelector('.ribbon-icon');
                            if (ribbonIcon) { ribbonIcon.style.visibility = 'hidden'; }
                            clonedDoc.querySelectorAll('*').forEach(el => { el.style.boxShadow = 'none'; el.style.animation = 'none'; });
                            const grid = clonedDoc.querySelector('.compare-grid');
                            if (grid) { grid.style.display = 'grid'; grid.style.gridTemplateColumns = '1fr 1fr'; }
                            clonedDoc.querySelectorAll('p, h1, h2, h3, h4, span, div').forEach(el => { if (!el.closest('#ai-tip-box')) el.style.color = '#1e293b'; });
                        }
                    },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                }).from(element).save();
            };

            if (currentUser) {
                try {
                    const docRef = doc(db, 'artifacts', internalAppId, 'public', 'data', 'responses', currentUser.uid);
                    await setDoc(docRef, { 
                        uid: currentUser.uid, 
                        levelKey: result.key, 
                        levelName: result.name, 
                        points: totalPoints, 
                        categoryBreakdown: categoryScores,
                        weakestArea: weakestCat,
                        alias: alias, // SAVE ALIAS TO DB
                        ts: new Date().toISOString() 
                    });
                } catch (e) { console.error(e); }
            }
        }

        showIntro();
    </script>
</body>
</html>
