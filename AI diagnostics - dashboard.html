<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lektorský Dashboard | Live Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        h1, h2, h3, .font-poppins { font-family: 'Poppins', sans-serif; }
        .chart-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); }
        .transition-all { transition: all 0.3s ease; }
        .team-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 text-slate-100">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black italic text-blue-500 tracking-tight uppercase">Live <span class="text-white">Analysis</span></h1>
                <p class="text-slate-500 text-[10px] mt-1 uppercase tracking-[0.3em] font-bold">AI Maturity Index Dashboard</p>
            </div>
            
            <div class="flex items-center gap-4 flex-wrap sm:flex-nowrap">
                <!-- Master Reveal Switch -->
                <button id="master-reveal-btn" onclick="toggleGlobalReveal()" class="w-48 h-11 flex items-center justify-center gap-2 bg-slate-800 text-slate-400 text-[10px] uppercase font-bold tracking-widest rounded-xl transition-all border border-white/5 shadow-md hover:bg-slate-700">
                    <i id="reveal-icon" data-lucide="eye-off" size="14"></i>
                    <span id="reveal-text">Aliasy: Skryté</span>
                </button>

                <button id="toggle-teams-btn" onclick="toggleTeamsUI()" class="w-48 h-11 flex items-center justify-center gap-2 bg-slate-800 text-slate-400 text-[10px] uppercase font-bold tracking-widest rounded-xl transition-all border border-white/5 hover:bg-slate-700">
                    <i data-lucide="users" size="14"></i>
                    <span>Týmový režim</span>
                </button>

                <!-- Tlačítko Reset s dynamickým hoverem -->
                <button id="reset-btn" onclick="handleReset()" class="w-48 h-11 flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-400 text-[10px] uppercase font-bold tracking-widest rounded-xl transition-all border border-white/5">
                    <i data-lucide="trash-2" size="14"></i>
                    <span id="reset-text">Vynulovat</span>
                </button>
                
                <div class="text-right border-l border-white/10 pl-6 hidden lg:block">
                    <div id="total-count" class="text-5xl font-black text-white leading-none">0</div>
                    <div class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Lidí</div>
                </div>
            </div>
        </header>

        <div class="space-y-8">
            <!-- Main Chart -->
            <div class="chart-card p-6 sm:p-10 rounded-[2.5rem] border border-white/5 shadow-2xl overflow-hidden relative min-h-[450px] flex flex-col">
                <h3 class="text-slate-400 text-[10px] font-bold uppercase mb-8 tracking-[0.25em] text-center">Rozložení kompetencí v reálném čase</h3>
                <div class="relative flex-grow h-full"><canvas id="mainChart"></canvas></div>
            </div>

            <!-- Team Builder Section -->
            <div id="teams-section" class="chart-card p-6 sm:p-10 rounded-[2.5rem] border border-white/5 shadow-2xl hidden animate-fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                    <div>
                        <h3 class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.25em]">Týmové rozdělení</h3>
                        <p class="text-[10px] text-slate-600 uppercase mt-1 tracking-widest">Snake-Sort Algorithm</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="bg-slate-900 px-4 py-2 rounded-xl border border-white/5 flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">Týmů:</span>
                            <input type="number" id="team-count" value="4" min="1" max="20" class="bg-transparent text-white font-bold w-10 text-center outline-none">
                        </div>
                        <button onclick="generateTeams()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold uppercase px-6 py-2.5 rounded-xl transition-all shadow-xl shadow-blue-900/20 tracking-widest font-poppins">Sestavit</button>
                    </div>
                </div>
                <div id="teams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 text-slate-300">
                    <div class="col-span-full py-12 text-center border-2 border-dashed border-white/5 rounded-[2rem]">
                        <p class="text-slate-500 text-sm italic">Zadejte počet skupin a potvrďte.</p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 flex justify-between items-center px-4">
            <button onclick="exportCSV()" class="text-slate-500 hover:text-white text-[10px] uppercase font-bold tracking-widest flex items-center gap-2 transition-colors"><i data-lucide="file-spreadsheet" size="14"></i> Export CSV</button>
            <div class="flex gap-2 items-center"><div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div><span class="text-slate-600 text-[9px] uppercase tracking-widest font-medium">Live connection active</span></div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, getDocs, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURACE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBmy6Wg2hgML35nbBqavkDDDV1aIZTCqsU",
            authDomain: "ai-diagnostika.firebaseapp.com",
            projectId: "ai-diagnostika",
            storageBucket: "ai-diagnostika.firebasestorage.app",
            messagingSenderId: "965470292600",
            appId: "1:965470292600:web:28ba845829a3c849773b8d"
        };

        const internalAppId = 'ai-diagnostika-2024';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let chart;
        let lastData = [];
        let isConfirming = false;
        let globalRevealStatus = false;

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['L0: Rezistence', 'L1: Pozorovatel', 'L2: Experimentátor', 'L3: Stratég', 'L4: Integrátor'],
                    datasets: [{ label: 'Lidí', data: [0, 0, 0, 0, 0], backgroundColor: '#3b82f6', borderRadius: 12, maxBarThickness: 60 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1, color: '#94a3b8' }, grid: { color: 'rgba(255, 255, 255, 0.05)' } },
                        x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.toggleGlobalReveal = async () => {
            try {
                globalRevealStatus = !globalRevealStatus;
                const ref = doc(db, 'artifacts', internalAppId, 'public', 'data', 'settings', 'global');
                await setDoc(ref, { allowAliasReveal: globalRevealStatus }, { merge: true });
                console.log("Stav odhalení uložen:", globalRevealStatus);
            } catch (err) {
                console.error("Chyba oprávnění! Ujistěte se, že cesta 'settings/global' je povolená v pravidlech Firebase.", err);
            }
        };

        window.toggleTeamsUI = () => {
            const section = document.getElementById('teams-section');
            const btn = document.getElementById('toggle-teams-btn');
            const isHidden = section.classList.toggle('hidden');
            btn.classList.toggle('bg-blue-600', !isHidden);
            btn.classList.toggle('text-white', !isHidden);
            lucide.createIcons();
        };

        window.handleReset = async () => {
            const txt = document.getElementById('reset-text');
            const btn = document.getElementById('reset-btn');
            
            if (!isConfirming) {
                isConfirming = true;
                txt.innerText = "Smazat vše?";
                btn.classList.remove('bg-slate-800', 'hover:bg-slate-700', 'text-slate-400');
                btn.classList.add('bg-red-600', 'hover:bg-red-700', 'text-white', 'animate-pulse');
                
                setTimeout(() => { 
                    if (isConfirming) { 
                        isConfirming = false; 
                        txt.innerText = "Vynulovat"; 
                        btn.classList.remove('bg-red-600', 'hover:bg-red-700', 'text-white', 'animate-pulse');
                        btn.classList.add('bg-slate-800', 'hover:bg-slate-700', 'text-slate-400');
                    } 
                }, 5000);
                return;
            }

            try {
                txt.innerText = "Mažu...";
                const colRef = collection(db, 'artifacts', internalAppId, 'public', 'data', 'responses');
                const snap = await getDocs(colRef);
                await Promise.all(snap.docs.map(d => deleteDoc(doc(db, 'artifacts', internalAppId, 'public', 'data', 'responses', d.id))));
                
                isConfirming = false;
                txt.innerText = "Vynulovat";
                btn.classList.remove('bg-red-600', 'hover:bg-red-700', 'text-white', 'animate-pulse');
                btn.classList.add('bg-slate-800', 'hover:bg-slate-700', 'text-slate-400');
            } catch (e) { console.error("Reset error:", e); }
        };

        window.generateTeams = () => {
            if (lastData.length === 0) return;
            const teamCount = Math.max(1, parseInt(document.getElementById('team-count').value));
            const grid = document.getElementById('teams-grid');
            grid.innerHTML = '';
            const sorted = [...lastData].sort((a, b) => b.levelKey.localeCompare(a.levelKey));
            const teams = Array.from({ length: teamCount }, () => []);
            sorted.forEach((person, i) => {
                const row = Math.floor(i / teamCount);
                const teamIdx = (row % 2 === 0) ? (i % teamCount) : (teamCount - 1 - (i % teamCount));
                teams[teamIdx].push(person);
            });
            teams.forEach((members, i) => {
                if (members.length === 0) return;
                const box = document.createElement('div');
                box.className = "team-card p-6 rounded-[2rem] flex flex-col shadow-lg transition-all hover:border-blue-500/30";
                box.innerHTML = `<div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2"><span class="text-blue-500 font-black text-[10px] uppercase tracking-wider">Tým ${i + 1}</span><span class="text-slate-600 text-[9px] font-bold">${members.length} čl.</span></div><ul class="space-y-3">${members.map(m => `<li class="flex justify-between items-center"><span class="text-sm text-slate-300 font-medium">${m.alias || 'Anonymní'}</span><span class="text-[9px] font-black bg-slate-800 text-slate-400 px-2 py-0.5 rounded uppercase">L${m.levelKey === 'A'?'0':m.levelKey==='B'?'1':m.levelKey==='C'?'2':m.levelKey==='D'?'3':'4'}</span></li>`).join('')}</ul>`;
                grid.appendChild(box);
            });
            lucide.createIcons();
        };

        window.exportCSV = () => {
            if (lastData.length === 0) return;
            let csv = "Alias;Level;Points;Timestamp\n";
            lastData.forEach(r => csv += `${r.alias || 'Anonym'};${r.levelName};${r.points};${r.ts}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `AI_Adopce_Export.csv`;
            link.click();
        };

        async function start() {
            await signInAnonymously(auth);
            initChart();
            lucide.createIcons();

            onSnapshot(doc(db, 'artifacts', internalAppId, 'public', 'data', 'settings', 'global'), (snap) => {
                if (snap.exists()) {
                    globalRevealStatus = snap.data().allowAliasReveal;
                    const btn = document.getElementById('master-reveal-btn');
                    const text = document.getElementById('reveal-text');
                    btn.classList.toggle('bg-blue-600', globalRevealStatus);
                    btn.classList.toggle('text-white', globalRevealStatus);
                    text.innerText = globalRevealStatus ? "Aliasy: Viditelné" : "Aliasy: Skryté";
                    const icon = document.getElementById('reveal-icon');
                    icon.setAttribute('data-lucide', globalRevealStatus ? 'eye' : 'eye-off');
                    lucide.createIcons();
                }
            }, (err) => console.error("Snapshot error (check rules):", err));

            onSnapshot(collection(db, 'artifacts', internalAppId, 'public', 'data', 'responses'), (snap) => {
                lastData = snap.docs.map(d => d.data());
                const counts = { A: 0, B: 0, C: 0, D: 0, E: 0 };
                lastData.forEach(d => { if(counts[d.levelKey] !== undefined) counts[d.levelKey]++; });
                document.getElementById('total-count').innerText = lastData.length;
                chart.data.datasets[0].data = Object.values(counts);
                chart.update();
                if (lastData.length === 0) {
                    document.getElementById('teams-grid').innerHTML = '<div class="col-span-full py-12 text-center border-2 border-dashed border-white/5 rounded-[2rem]"><p class="text-slate-500 text-sm italic">Žádná data k rozdělení.</p></div>';
                }
            });
        }
        start();
    </script>
</body>
</html>
