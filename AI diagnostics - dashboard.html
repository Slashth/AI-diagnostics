<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lektorský Dashboard | Live Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        h1, h2, h3, .font-poppins { font-family: 'Poppins', sans-serif; }
        .chart-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); }
        .transition-all { transition: all 0.3s ease; }
        .team-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black italic text-blue-500 tracking-tight uppercase">Live <span class="text-white">Analysis</span></h1>
                <p class="text-slate-500 text-[10px] mt-1 uppercase tracking-[0.3em] font-bold">AI Maturity Index Dashboard</p>
            </div>
            
            <div class="flex items-center gap-4 flex-wrap sm:flex-nowrap">
                <!-- Tlačítko pro přepínání týmového režimu -->
                <button id="toggle-teams-btn" onclick="toggleTeams()" class="w-48 h-11 flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-400 text-[10px] uppercase font-bold tracking-widest rounded-xl transition-all border border-white/5">
                    <i data-lucide="users" size="14"></i>
                    <span id="teams-btn-text">Týmový režim</span>
                </button>

                <button id="reset-btn" onclick="handleReset()" class="w-48 h-11 flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-400 text-[10px] uppercase font-bold tracking-widest rounded-xl transition-all border border-white/5">
                    <i data-lucide="trash-2" size="14"></i>
                    <span id="reset-text">Vynulovat data</span>
                </button>
                
                <button id="export-csv-btn" class="w-48 h-11 flex items-center justify-center gap-2 bg-slate-800 hover:bg-blue-600 text-slate-400 hover:text-white text-[10px] uppercase font-bold tracking-widest rounded-xl transition-all border border-white/5 shadow-lg">
                    <i data-lucide="file-spreadsheet" size="14"></i>
                    <span>Exportovat CSV</span>
                </button>

                <div class="text-right border-l border-white/10 pl-6 hidden md:block">
                    <div id="total-count" class="text-5xl font-black text-white leading-none">0</div>
                    <div class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Účastníků</div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="space-y-8">
            <!-- Graph Card -->
            <div class="chart-card p-6 sm:p-10 rounded-[2.5rem] border border-white/5 shadow-2xl overflow-hidden relative min-h-[500px] flex flex-col">
                <h3 class="text-slate-400 text-[10px] font-bold uppercase mb-8 tracking-[0.25em] text-center">Rozložení kompetencí v reálném čase</h3>
                <div class="relative flex-grow h-full">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <!-- Team Builder Section (Skrytá ve výchozím stavu) -->
            <div id="teams-section" class="chart-card p-6 sm:p-10 rounded-[2.5rem] border border-white/5 shadow-2xl hidden animate-fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                    <div>
                        <h3 class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.25em]">Týmové rozdělení</h3>
                        <p class="text-[10px] text-slate-600 uppercase mt-1">Algoritmus Snake-Sort pro namíchané týmy</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 bg-slate-900 px-4 py-2 rounded-xl border border-white/5">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">Počet skupin:</span>
                            <input type="number" id="team-count" value="4" min="1" max="20" class="bg-transparent text-white font-bold w-10 text-center outline-none">
                        </div>
                        <button onclick="generateTeams()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold uppercase px-6 py-2.5 rounded-xl transition-all shadow-xl shadow-blue-900/20">Sestavit týmy</button>
                    </div>
                </div>
                
                <div id="teams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="col-span-full py-12 text-center border-2 border-dashed border-white/5 rounded-[2rem]">
                        <p class="text-slate-500 text-sm italic">Zadejte počet skupin a klikněte na tlačítko výše.</p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 flex justify-between items-center px-4">
            <p class="text-slate-600 text-[9px] uppercase tracking-widest font-medium">Auto-sync via Firebase Firestore</p>
            <div class="flex gap-2 items-center">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-slate-600 text-[9px] uppercase tracking-widest font-medium">Live Connection Active</span>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmy6Wg2hgML35nbBqavkDDDV1aIZTCqsU",
            authDomain: "ai-diagnostika.firebaseapp.com",
            projectId: "ai-diagnostika",
            storageBucket: "ai-diagnostika.firebasestorage.app",
            messagingSenderId: "965470292600",
            appId: "1:965470292600:web:28ba845829a3c849773b8d"
        };

        const internalAppId = 'ai-diagnostika-2024';
        const levelNames = { 'A': 'L0', 'B': 'L1', 'C': 'L2', 'D': 'L3', 'E': 'L4' };

        let chart;
        let lastData = [];
        let isConfirming = false;
        let teamsVisible = false;

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['L0: Pozorovatel', 'L1: Experimentátor', 'L2: Pokročilý', 'L3: Stratég', 'L4: Integrátor'],
                    datasets: [{ label: 'Účastníci', data: [0, 0, 0, 0, 0], backgroundColor: '#3b82f6', borderRadius: 12, maxBarThickness: 60 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1, color: '#94a3b8' }, grid: { color: 'rgba(255, 255, 255, 0.05)' } },
                        x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // --- TOGGLE TÝMŮ ---
        window.toggleTeams = () => {
            const section = document.getElementById('teams-section');
            const btn = document.getElementById('toggle-teams-btn');
            teamsVisible = !teamsVisible;
            
            if (teamsVisible) {
                section.classList.remove('hidden');
                btn.classList.remove('bg-slate-800', 'text-slate-400');
                btn.classList.add('bg-blue-600', 'text-white');
            } else {
                section.classList.add('hidden');
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-800', 'text-slate-400');
            }
        };

        window.handleReset = async () => {
            const txt = document.getElementById('reset-text');
            const btn = document.getElementById('reset-btn');
            if (!isConfirming) {
                isConfirming = true;
                txt.innerText = "Smazat vše?";
                btn.classList.remove('bg-slate-800', 'hover:bg-slate-700', 'text-slate-400');
                btn.classList.add('bg-red-600', 'hover:bg-red-700', 'text-white', 'animate-pulse');
                setTimeout(() => { if (isConfirming) { isConfirming = false; txt.innerText = "Vynulovat data"; btn.classList.remove('bg-red-600', 'hover:bg-red-700', 'text-white', 'animate-pulse'); btn.classList.add('bg-slate-800', 'hover:bg-slate-700', 'text-slate-400'); } }, 5000);
                return;
            }
            try {
                const colRef = collection(db, 'artifacts', internalAppId, 'public', 'data', 'responses');
                const snap = await getDocs(colRef);
                await Promise.all(snap.docs.map(d => deleteDoc(doc(db, 'artifacts', internalAppId, 'public', 'data', 'responses', d.id))));
                isConfirming = false;
                txt.innerText = "Vynulovat data";
                btn.classList.remove('bg-red-600', 'hover:bg-red-700', 'text-white', 'animate-pulse');
                btn.classList.add('bg-slate-800', 'hover:bg-slate-700', 'text-slate-400');
            } catch (e) { console.error(e); }
        };

        window.generateTeams = () => {
            if (lastData.length === 0) return;
            const teamCount = Math.max(1, parseInt(document.getElementById('team-count').value) || 1);
            const grid = document.getElementById('teams-grid');
            grid.innerHTML = '';

            const sorted = [...lastData].sort((a, b) => b.levelKey.localeCompare(a.levelKey));
            const teams = Array.from({ length: teamCount }, () => []);

            sorted.forEach((person, i) => {
                const row = Math.floor(i / teamCount);
                let teamIdx;
                if (row % 2 === 0) { teamIdx = i % teamCount; } 
                else { teamIdx = (teamCount - 1) - (i % teamCount); }
                teams[teamIdx].push(person);
            });

            teams.forEach((members, i) => {
                if (members.length === 0) return;
                const teamBox = document.createElement('div');
                teamBox.className = "team-card p-6 rounded-[2rem] flex flex-col transition-all hover:border-blue-500/30";
                teamBox.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-3">
                        <span class="text-blue-500 font-black uppercase text-[10px] tracking-widest">Tým ${i + 1}</span>
                        <span class="text-slate-600 text-[9px] font-bold uppercase tracking-widest">${members.length} čl.</span>
                    </div>
                    <ul class="space-y-3">
                        ${members.map(m => `
                            <li class="flex justify-between items-center group">
                                <span class="text-sm font-medium text-slate-300 group-hover:text-white transition-colors">${m.alias || 'Anonymní'}</span>
                                <span class="text-[9px] font-black bg-slate-800 text-slate-400 px-2 py-0.5 rounded border border-white/5 uppercase">${levelNames[m.levelKey] || 'N/A'}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
                grid.appendChild(teamBox);
            });
        };

        document.getElementById('export-csv-btn').onclick = () => {
            if (lastData.length === 0) return;
            let csv = "UID;Alias;LevelKey;LevelName;Points;WeakestArea;Timestamp\n";
            lastData.forEach(row => { csv += `${row.uid || ''};${row.alias || ''};${row.levelKey || ''};${row.levelName || ''};${row.points || 0};${row.weakestArea || ''};${row.ts || ''}\n`; });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", `AI_Maturity_Data_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        async function connect() {
            await signInAnonymously(auth);
            const colRef = collection(db, 'artifacts', internalAppId, 'public', 'data', 'responses');
            onSnapshot(colRef, (snap) => {
                const data = snap.docs.map(d => d.data());
                lastData = data;
                updateUI(data);
            });
        }

        function updateUI(data) {
            const counts = { A: 0, B: 0, C: 0, D: 0, E: 0 };
            data.forEach(d => { if(counts[d.levelKey] !== undefined) counts[d.levelKey]++; });
            document.getElementById('total-count').innerText = data.length;
            if (chart) { chart.data.datasets[0].data = [counts.A, counts.B, counts.C, counts.D, counts.E]; chart.update(); }
        }

        window.onload = () => { initChart(); lucide.createIcons(); connect(); };
    </script>
</body>
</html>
